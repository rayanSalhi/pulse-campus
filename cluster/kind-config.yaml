# Config kind pour le cluster TP 3.
# Consommée par `make cluster-up`.
#
# Choix faits ici :
#   - 1 control-plane + 1 worker (identique au TP 2) ;
#   - le control-plane est labellisé `ingress-ready=true` (ingress-nginx s'y déploie) ;
#   - les ports 80/443 du control-plane sont publiés sur l'hôte, ce qui rend les
#     ingress accessibles via http://<host>.devhub.local depuis votre navigateur.

# Image de nœud épinglée : sans cette clé, kind récupère la dernière image
# kindest/node disponible (ex: v1.36.x), trop récente pour le client
# Kubernetes embarqué dans ArgoCD 7.6.12/2.12.6 (champ .status.terminatingReplicas
# non reconnu -> ComparisonError persistant sur toutes les Applications).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: pulse
nodes:
  - role: control-plane
    image: kindest/node:v1.31.0
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
    image: kindest/node:v1.31.0
