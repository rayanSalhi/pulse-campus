{{- /*
  Ingress preview (étape 8, blueGreen) : donne accès à la nouvelle version
  AVANT bascule du trafic utilisateur, via previewService. N'est joignable
  que par ce host dédié — piège documenté au poly : sans cet Ingress, le
  previewService reste inaccessible depuis l'extérieur du cluster.
*/ -}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "planning.fullname" . }}-preview
  labels:
    {{- include "planning.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.previewHost | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "planning.fullname" . }}-preview
                port:
                  number: {{ .Values.service.port }}
{{- end }}
