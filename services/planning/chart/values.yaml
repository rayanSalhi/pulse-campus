# Values par défaut du chart planning.
# Surchargées par values-dev.yaml selon l'environnement.

image:
  repository: planning
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: planning.devhub.local
  previewHost: planning-preview.devhub.local
  path: /

env:
  LOG_LEVEL: info

metrics:
  buckets: "0.05,0.1,0.2,0.3,0.5,1,2,5"
  businessEnabled: false

monitoring:
  enabled: false
  serviceMonitor:
    interval: 30s
    release: kps

# Étape 8 : Rollout blueGreen en place, le Deployment de secours est supprimé.
useDeployment: false

# rollout.marker : même mécanisme que pour annuaire (étape 5) pour déclencher
# une nouvelle version malgré le tag d'image fixe (dev).
# rollout.autoPromotionEnabled : false pour la première démo (bascule
# manuelle) ; passer à true active la bascule automatique.
# rollout.prePromotionAnalysis : false pour la première démo, true pour la
# seconde (bascule conditionnée à l'AnalysisTemplate de vérification preview).
rollout:
  marker: "v2"
  failRate: "0"
  autoPromotionEnabled: false
  prePromotionAnalysis: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 2
    periodSeconds: 5
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
