{{- /*
  Rollout (étape 5) : remplace deployment.yaml. Stratégie canary avec
  traffic routing nginx (poids réel via l'Ingress canary auto-géré par le
  contrôleur Argo Rollouts, pas une approximation par nombre de réplicas).

  Déclenchement d'un nouveau canary : ce TP construit les images en local
  avec un tag fixe (image.tag: dev, cf. Makefile) plutôt qu'un tag basé sur
  le SHA Git — un `make images-build images-load` seul ne change donc rien
  au pod template. Le déclencheur ici est `rollout.marker` (values.yaml) :
  bumpez sa valeur et committez pour simuler un nouveau commit image.tag:
  <sha> tel que décrit dans "La promesse de cette chaîne" du poly.
*/ -}}
{{- if not .Values.useDeployment }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "annuaire.fullname" . }}
  labels:
    {{- include "annuaire.labels" . | nindent 4 }}
  annotations:
    # Étape 10 : notifications sur les déclencheurs intégrés d'Argo Rollouts.
    # "rollout-events" doit correspondre au nom du notifier
    # (service.webhook.rollout-events) déclaré dans argo-rollouts-values.yaml.
    notifications.argoproj.io/subscribe.on-rollout-completed.rollout-events: ""
    notifications.argoproj.io/subscribe.on-rollout-aborted.rollout-events: ""
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "annuaire.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "annuaire.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: annuaire
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: METRICS_BUCKETS
              value: {{ .Values.metrics.buckets | quote }}
            - name: METRICS_BUSINESS_ENABLED
              value: {{ .Values.metrics.businessEnabled | quote }}
            - name: VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: COMMIT
              value: {{ .Values.image.tag | quote }}
            - name: ROLLOUT_MARKER
              value: {{ .Values.rollout.marker | quote }}
            - name: FAIL_RATE
              value: {{ .Values.rollout.failRate | quote }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
  strategy:
    canary:
      canaryService: {{ include "annuaire.fullname" . }}-canary
      stableService: {{ include "annuaire.fullname" . }}
      trafficRouting:
        nginx:
          stableIngress: {{ include "annuaire.fullname" . }}
          # Étape 9 : routage header-based. Le step déclaratif setHeaderRoute
          # n'est PAS supporté par le provider nginx (seulement Istio/ALB/
          # Apisix — erreur CRD explicite testée en conditions réelles :
          # "SetHeaderRoute requires TrafficRouting, supports Istio and ALB
          # and Apisix"). Avec nginx, le mécanisme correct est d'ajouter les
          # annotations canary-by-header directement sur l'Ingress canary
          # qu'Argo Rollouts gère déjà lui-même — pas d'Ingress supplémentaire
          # à écrire à la main (piège de l'étape 5 sur les Ingress canary
          # dupliqués). Un testeur envoyant X-Beta-User: true touche
          # systématiquement le canary, indépendamment du setWeight en cours.
          additionalIngressAnnotations:
            canary-by-header: X-Beta-User
            canary-by-header-value: "true"
      steps:
        - setWeight: 20
        # Étape 7 : la promotion vers 50%/100% est désormais conditionnée à
        # l'AnalysisTemplate (taux d'erreur + latence p95 du canary), plus
        # au pause manuel de l'étape 6 — le canary se promeut ou se rollback
        # tout seul si les métriques restent/sortent des seuils du SLO.
        - analysis:
            templates:
              - templateName: {{ include "annuaire.fullname" . }}-success-rate
            args:
              - name: canary-hash
                valueFrom:
                  podTemplateHashValue: Latest
        - setWeight: 50
        - pause: {duration: 30s}
        - setWeight: 100
{{- end }}
