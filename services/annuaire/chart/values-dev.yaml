# Surcharges pour l'environnement de développement (namespace devhub-dev).
# Ne mettez ICI que ce qui diffère de values.yaml.

ingress:
  enabled: true
  host: annuaire.devhub.local

env:
  LOG_LEVEL: debug

metrics:
  buckets: "0.05, 0.1, 0.2, 0.3, 0.5, 1, 2"

monitoring:
  enabled: true

# Étape 10, démo de l'alerte "page" : FAIL_RATE > seuil SLO (1%) sur /break.
# Remis à "0" une fois l'alerte observée firing (voir RAPPORT.md).
rollout:
  marker: "v11-alert-page-demo"
  failRate: "0.6"
