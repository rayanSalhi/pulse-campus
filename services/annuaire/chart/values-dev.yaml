# Surcharges pour l'environnement de développement (namespace devhub-dev).
# Ne mettez ICI que ce qui diffère de values.yaml.

ingress:
  enabled: true
  host: annuaire.devhub.local

env:
  LOG_LEVEL: debug

metrics:
  buckets: "0.05, 0.1, 0.2, 0.3, 0.5, 1, 2"

monitoring:
  enabled: true

# Étape 7, cas dégradé : FAIL_RATE > seuil SLO (1%) sur /break pour
# provoquer un rollback automatique de l'AnalysisTemplate. Remis à "0" une
# fois la démonstration terminée (voir RAPPORT.md).
rollout:
  marker: "v9-fail-demo"
  failRate: "0.5"
