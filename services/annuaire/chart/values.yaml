# Values par défaut du chart annuaire.
# Surchargées par values-dev.yaml selon l'environnement.

image:
  repository: annuaire
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: annuaire.devhub.local
  path: /

env:
  LOG_LEVEL: info

# Métriques Prometheus — paramètres injectés au pod via variables d'environnement.
# Les buckets sont à ajuster en étape 2 en fonction de votre SLO de latence.
metrics:
  buckets: "0.05,0.1,0.2,0.3,0.5,1,2,5"
  businessEnabled: false

# Sera passé à true en étape 4 (ServiceMonitor activé).
monitoring:
  enabled: false
  serviceMonitor:
    interval: 30s
    # Doit correspondre au releaseName du chart kube-prometheus-stack.
    release: kps

# Étape 5 : Rollout en place, le Deployment de secours est supprimé du chart
# (pas conservé en doublon, cf. piège documenté au poly).
useDeployment: false

# rollout.marker : bump cette valeur (+ commit) pour déclencher un nouveau
# canary — ce TP construit les images avec un tag fixe (dev), donc rien
# d'autre dans le pod template ne change automatiquement à chaque build.
# rollout.failRate : 0..1, injecte du 500 sur /break (utilisé étape 7 pour
# provoquer un rollback automatique). Piloté séparément par environnement
# (values-dev.yaml) pour ne jamais l'activer par erreur ailleurs.
rollout:
  marker: "v6"
  failRate: "0"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 2
    periodSeconds: 5
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
