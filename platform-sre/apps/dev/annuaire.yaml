apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: annuaire-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devhub

  source:
    repoURL: https://github.com/rayanSalhi/pulse-campus.git
    targetRevision: main
    path: services/annuaire/chart
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: devhub-dev

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  # Argo Rollouts patche spec.selector des Services stable/canary pour y
  # ajouter rollouts-pod-template-hash au runtime. Sans cette exclusion,
  # chaque sync ArgoCD réapplique le sélecteur "nu" du chart (sans le hash)
  # et efface ce patch — le contrôleur croit alors qu'aucune version n'est
  # encore active et retraite le canary comme un "Initial deploy".
  ignoreDifferences:
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/selector