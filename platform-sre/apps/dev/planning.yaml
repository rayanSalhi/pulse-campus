# Application ArgoCD : planning-dev
#
# Déploie le chart Helm de services/planning/chart dans le namespace devhub-dev.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: planning-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devhub

  source:
    # TODO : URL de votre fork.
    repoURL: https://github.com/rayanSalhi/pulse-campus.git
    targetRevision: main
    path: services/planning/chart
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: devhub-dev

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  # Argo Rollouts patche spec.selector des Services active/preview pour y
  # ajouter rollouts-pod-template-hash au runtime. Sans cette exclusion,
  # chaque sync ArgoCD réapplique le sélecteur "nu" du chart (sans le hash)
  # et efface ce patch — observé en pratique : le blueGreen se comportait
  # comme si chaque révision était un "Initial deploy" (activeSelector et
  # previewSelector confondus dès la création, malgré autoPromotionEnabled:
  # false), à chaque hard-refresh ArgoCD rapproché du précédent.
  ignoreDifferences:
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/selector
