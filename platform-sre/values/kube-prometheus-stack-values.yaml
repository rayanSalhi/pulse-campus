# Values du chart kube-prometheus-stack pour le TP 3.
# Référence : https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
#
# Ce fichier est volontairement minimaliste. Tweakez-le étape 3.

fullnameOverride: kps

# ---- Grafana ----
grafana:
  enabled: true
  # Mot de passe admin PAS en clair dans Git (piège documenté à l'étape 3 du
  # poly : laisser "prom-operator"/"changeme" = incident à la moindre
  # exposition). Le Secret "grafana-admin-credentials" est créé hors-Git
  # (kubectl apply, une seule fois par cluster) - voir RAPPORT.md pour la
  # commande exacte. Défi bonus Sealed Secrets non traité dans cette session.
  admin:
    existingSecret: "grafana-admin-credentials"
    userKey: admin-user
    passwordKey: admin-password
  defaultDashboardsTimezone: browser
  ingress:
    enabled: true
    ingressClassName: nginx
    # TODO : alignez avec l'entrée que vous mettrez dans /etc/hosts.
    hosts:
      - grafana.devhub.local
    path: /
  # Auto-discovery des dashboards posés en ConfigMap avec le label `grafana_dashboard=1`.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"

# ---- Prometheus ----
prometheus:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    # TODO : alignez avec l'entrée que vous mettrez dans /etc/hosts.
    hosts:
      - prometheus.devhub.local
    paths:
      - /
  prometheusSpec:
    # Rétention courte pour le TP — adaptez si vous gardez le cluster longtemps.
    retention: 15d
    # En kind 2 nœuds, EmptyDir est suffisant. En prod : PVC.
    # TODO étape 3 (défi) : passez en PersistentVolumeClaim.
    storageSpec: {}
    # Sélectionne TOUS les ServiceMonitor portant le label `release: kps`,
    # quel que soit leur namespace. C'est l'option la plus permissive,
    # utile en TP.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector:
      matchLabels:
        release: kps
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    ruleSelector:
      matchLabels:
        release: kps

# ---- Alertmanager ----
alertmanager:
  enabled: true
  # Routing gradé (étape 10) : severity: page (réveille, group/repeat courts)
  # vs severity: ticket (attend, group/repeat longs) — la gradation documentée
  # au poly comme ce qui rend l'oncall vivable.
  #
  # Récepteurs : en l'absence d'un vrai Slack/PagerDuty/webhook.site pour ce
  # TP local, les deux webhooks pointent vers un petit pod "echo" local
  # (monitoring/webhook-echo, cf. RAPPORT.md) — testé en direct : pointer
  # vers Prometheus /-/healthy semblait pratique (déjà déployé) mais échoue
  # réellement (alertmanager_notifications_failed_total{reason="clientError"})
  # car Alertmanager envoie du POST et /-/healthy n'accepte que GET (405).
  # À remplacer par une vraie URL de webhook en prod.
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_by: ['alertname', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity = "page"
          receiver: webhook-page
          group_wait: 10s
          repeat_interval: 1h
        - matchers:
            - severity = "ticket"
          receiver: webhook-ticket
          repeat_interval: 12h
    receivers:
      - name: default
      - name: webhook-page
        webhook_configs:
          - url: http://webhook-echo.monitoring.svc.cluster.local:8080/
            send_resolved: true
      - name: webhook-ticket
        webhook_configs:
          - url: http://webhook-echo.monitoring.svc.cluster.local:8080/
            send_resolved: true

# ---- Sous-charts à désactiver sur kind ----
# Kind ne fournit pas les endpoints standards de la control plane.
# Laissez à false sinon Prometheus aura des cibles DOWN en permanence.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

# ---- Operator ----
prometheusOperator:
  admissionWebhooks:
    # En cluster local kind, l'auto-patch peut bloquer ; on simplifie.
    patch:
      enabled: false
    enabled: false
  # Sans cert-manager, le secret TLS {{fullname}}-admission n'est jamais créé ;
  # or l'opérateur le monte dès que tls.enabled=true (défaut du chart), ce qui
  # bloque le pod en ContainerCreating (FailedMount). On désactive donc aussi
  # le TLS interne de l'opérateur en local.
  tls:
    enabled: false
