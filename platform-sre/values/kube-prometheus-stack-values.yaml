# Values du chart kube-prometheus-stack pour le TP 3.
# Référence : https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
#
# Ce fichier est volontairement minimaliste. Tweakez-le étape 3.

fullnameOverride: kps

# ---- Grafana ----
grafana:
  enabled: true
  # Mot de passe admin PAS en clair dans Git (piège documenté à l'étape 3 du
  # poly : laisser "prom-operator"/"changeme" = incident à la moindre
  # exposition). Le Secret "grafana-admin-credentials" est créé hors-Git
  # (kubectl apply, une seule fois par cluster) - voir RAPPORT.md pour la
  # commande exacte. Défi bonus Sealed Secrets non traité dans cette session.
  admin:
    existingSecret: "grafana-admin-credentials"
    userKey: admin-user
    passwordKey: admin-password
  defaultDashboardsTimezone: browser
  ingress:
    enabled: true
    ingressClassName: nginx
    # TODO : alignez avec l'entrée que vous mettrez dans /etc/hosts.
    hosts:
      - grafana.devhub.local
    path: /
  # Auto-discovery des dashboards posés en ConfigMap avec le label `grafana_dashboard=1`.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"

# ---- Prometheus ----
prometheus:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    # TODO : alignez avec l'entrée que vous mettrez dans /etc/hosts.
    hosts:
      - prometheus.devhub.local
    paths:
      - /
  prometheusSpec:
    # Rétention courte pour le TP — adaptez si vous gardez le cluster longtemps.
    retention: 15d
    # En kind 2 nœuds, EmptyDir est suffisant. En prod : PVC.
    # TODO étape 3 (défi) : passez en PersistentVolumeClaim.
    storageSpec: {}
    # Sélectionne TOUS les ServiceMonitor portant le label `release: kps`,
    # quel que soit leur namespace. C'est l'option la plus permissive,
    # utile en TP.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector:
      matchLabels:
        release: kps
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    ruleSelector:
      matchLabels:
        release: kps

# ---- Alertmanager ----
alertmanager:
  enabled: true
  # TODO étape 10 : votre configuration Alertmanager (routes, receivers).
  # Tant que vide, le sous-chart utilise une config par défaut qui ne route
  # nulle part.
  config: {}

# ---- Sous-charts à désactiver sur kind ----
# Kind ne fournit pas les endpoints standards de la control plane.
# Laissez à false sinon Prometheus aura des cibles DOWN en permanence.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

# ---- Operator ----
prometheusOperator:
  admissionWebhooks:
    # En cluster local kind, l'auto-patch peut bloquer ; on simplifie.
    patch:
      enabled: false
    enabled: false
  # Sans cert-manager, le secret TLS {{fullname}}-admission n'est jamais créé ;
  # or l'opérateur le monte dès que tls.enabled=true (défaut du chart), ce qui
  # bloque le pod en ContainerCreating (FailedMount). On désactive donc aussi
  # le TLS interne de l'opérateur en local.
  tls:
    enabled: false
