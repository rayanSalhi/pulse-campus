# Values du chart argo-rollouts.
# Référence : https://github.com/argoproj/argo-helm/tree/main/charts/argo-rollouts
#
# Étape 5 du poly.

# Active le dashboard Web et l'expose via ingress sur rollouts.devhub.local.
dashboard:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - rollouts.devhub.local
    paths:
      - /
    pathType: Prefix

# Active le service de notifications utilisé en étape 10.
# Mêmes déclencheurs intégrés qu'Argo Rollouts fournit par défaut
# (on-rollout-completed, on-rollout-aborted) — la souscription se fait par
# annotation directement sur chaque Rollout (voir rollout.yaml d'annuaire).
# Webhook pointant vers le pod echo local monitoring/webhook-echo, faute
# d'un vrai récepteur externe pour ce TP (même logique que la config
# Alertmanager — /-/healthy de Prometheus a été essayé mais refusé le POST
# avec un 405).
notifications:
  notifiers:
    service.webhook.rollout-events:
      url: http://webhook-echo.monitoring.svc.cluster.local:8080/
  secret:
    create: true
  configmap:
    create: true

# En kind, gardez les ressources légères.
controller:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false
